<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xbox VR Dashboard</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Roboto+Mono:wght@300;400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Roboto Mono', monospace;
            color: #0f0;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease;
        }

        #loading-screen.hidden { opacity: 0; pointer-events: none; }

        .loader-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.5), 0 0 40px rgba(0,255,136,0.3);
            letter-spacing: 8px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        .loader-subtitle {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .loader-bar-container {
            width: 300px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            border-radius: 2px;
            animation: loadProgress 2.5s ease-out forwards;
            box-shadow: 0 0 10px rgba(0,255,136,0.5);
        }

        .loader-status {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 2px;
        }

        .loader-hud {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 30px;
            font-size: 0.7rem;
            color: #444;
        }

        .loader-hud span { display: flex; align-items: center; gap: 6px; }
        .loader-hud .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #333;
            animation: dotPulse 1s ease-in-out infinite;
        }
        .loader-hud .dot.active { background: #00ff88; box-shadow: 0 0 6px #00ff88; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.02); }
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            20% { width: 30%; }
            50% { width: 60%; }
            80% { width: 90%; }
            100% { width: 100%; }
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        #overlay-ui {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .hud-panel {
            position: absolute;
            background: rgba(10, 15, 20, 0.85);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            backdrop-filter: blur(10px);
            font-size: 0.75rem;
            color: #aaa;
            pointer-events: auto;
        }

        .hud-panel .label {
            color: #00ff88;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 4px;
            font-size: 0.65rem;
            text-transform: uppercase;
        }

        .hud-top-left {
            top: 20px; left: 20px;
            min-width: 180px;
        }

        .hud-top-right {
            top: 20px; right: 20px;
            text-align: right;
            min-width: 160px;
        }

        .hud-bottom-center {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .hud-control-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 136, 0.3);
            background: rgba(0, 255, 136, 0.05);
            color: #00ff88;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .hud-control-btn:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .hud-control-btn.active {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .zoom-indicator {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 20px;
            padding: 8px 24px;
            color: #00ff88;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .zoom-indicator.visible { opacity: 1; }

        .zoom-bar {
            width: 100px;
            height: 3px;
            background: #333;
            border-radius: 2px;
            margin-top: 6px;
            position: relative;
            overflow: hidden;
        }

        .zoom-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            border-radius: 2px;
            transition: width 0.2s ease;
        }

        .latency-graph {
            width: 100%;
            height: 30px;
            margin-top: 8px;
            position: relative;
        }

        .latency-graph canvas {
            width: 100%;
            height: 100%;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }

        .stat-value { color: #fff; font-weight: 500; }
        .stat-value.good { color: #00ff88; }
        .stat-value.warn { color: #ffaa00; }
        .stat-value.bad { color: #ff4444; }

        #hidden-assets { display: none; }

        .enter-vr-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 200;
            background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,200,255,0.15));
            border: 1px solid rgba(0,255,136,0.4);
            color: #00ff88;
            padding: 12px 24px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .enter-vr-btn:hover {
            background: linear-gradient(135deg, rgba(0,255,136,0.3), rgba(0,200,255,0.3));
            box-shadow: 0 0 25px rgba(0,255,136,0.3);
            transform: translateY(-2px);
        }

        .keyboard-hint {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 200;
            color: #555;
            font-size: 0.7rem;
            line-height: 1.6;
        }

        .keyboard-hint kbd {
            background: #222;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 2px 8px;
            color: #888;
            font-family: 'Roboto Mono', monospace;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-title">XBOX VR</div>
        <div class="loader-subtitle">SPATIAL DASHBOARD INITIALIZING</div>
        <div class="loader-bar-container">
            <div class="loader-bar"></div>
        </div>
        <div class="loader-status" id="loader-status">Loading core modules...</div>
        <div class="loader-hud">
            <span><div class="dot active" id="dot-1"></div>STREAM</span>
            <span><div class="dot" id="dot-2"></div>RENDER</span>
            <span><div class="dot" id="dot-3"></div>INPUT</span>
            <span><div class="dot" id="dot-4"></div>SPATIAL</span>
        </div>
    </div>

    <!-- Hidden Canvases for Textures -->
    <div id="hidden-assets">
        <canvas id="game-canvas" width="1920" height="1080"></canvas>
        <canvas id="browser-canvas" width="800" height="1200"></canvas>
        <canvas id="chat-canvas" width="600" height="800"></canvas>
        <canvas id="system-canvas" width="600" height="600"></canvas>
        <img id="grid-tex" crossorigin="anonymous" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
    </div>

    <!-- Overlay UI -->
    <div id="overlay-ui">
        <div class="hud-panel hud-top-left">
            <div class="label">Session Status</div>
            <div class="stat-row"><span>Connection</span><span class="stat-value good">CONNECTED</span></div>
            <div class="stat-row"><span>Latency</span><span class="stat-value good" id="latency-val">24ms</span></div>
            <div class="stat-row"><span>Bitrate</span><span class="stat-value" id="bitrate-val">45 Mbps</span></div>
            <div class="stat-row"><span>Codec</span><span class="stat-value good">H.265</span></div>
            <div class="latency-graph"><canvas id="latency-canvas" width="160" height="30"></canvas></div>
        </div>

        <div class="hud-panel hud-top-right">
            <div class="label">System Health</div>
            <div class="stat-row"><span>GPU Temp</span><span class="stat-value good" id="gpu-temp">55°C</span></div>
            <div class="stat-row"><span>CPU Load</span><span class="stat-value good" id="cpu-load">12%</span></div>
            <div class="stat-row"><span>FPS</span><span class="stat-value good" id="fps-val">60</span></div>
            <div class="stat-row"><span>Battery</span><span class="stat-value warn" id="battery-val">68%</span></div>
        </div>

        <div class="hud-panel hud-bottom-center">
            <div class="hud-control-btn" id="btn-home" title="Home">⌂</div>
            <div class="hud-control-btn" id="btn-browser" title="Browser">🌐</div>
            <div class="hud-control-btn" id="btn-chat" title="Chat">💬</div>
            <div class="hud-control-btn" id="btn-system" title="System">⚙</div>
            <div class="hud-control-btn" id="btn-mr" title="Mixed Reality">👁</div>
        </div>

        <div class="zoom-indicator" id="zoom-indicator">
            <div>FOCUS / ZOOM</div>
            <div class="zoom-bar">
                <div class="zoom-bar-fill" id="zoom-bar-fill" style="width: 50%"></div>
            </div>
        </div>
    </div>

    <div class="keyboard-hint">
        <kbd>↑</kbd><kbd>↓</kbd> Zoom &nbsp; 
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Look &nbsp;
        <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> Toggle Panels
    </div>

    <button class="enter-vr-btn" id="enter-vr">ENTER VR</button>

    <!-- A-Frame Scene -->
    <a-scene 
        background="color: #050508"
        renderer="antialias: true; colorManagement: true; highRefreshRate: true"
        vr-mode-ui="enabled: false"
        loading-screen="enabled: false">

        <a-assets>
            <canvas id="game-canvas-asset" crossorigin="anonymous"></canvas>
            <canvas id="browser-canvas-asset" crossorigin="anonymous"></canvas>
            <canvas id="chat-canvas-asset" crossorigin="anonymous"></canvas>
            <canvas id="system-canvas-asset" crossorigin="anonymous"></canvas>
            <img id="grid-asset" src="https://cdn.aframe.io/a-painter/images/floor.jpg" crossorigin="anonymous">
        </a-assets>

        <!-- Environment -->
        <a-entity id="room">
            <!-- Back wall cylinder -->
            <a-entity 
                geometry="primitive: cylinder; radius: 12; height: 12; openEnded: true"
                material="color: #0a0a10; side: double; transparent: true; opacity: 0.95"
                position="0 3 0">
            </a-entity>

            <!-- Floor grid -->
            <a-plane 
                src="#grid-asset"
                rotation="-90 0 0"
                width="30" height="30"
                material="repeat: 50 50; transparent: true; opacity: 0.15; color: #00ff88"
                position="0 0 0">
            </a-plane>

            <!-- Ambient particles (stars) -->
            <a-entity id="stars"></a-entity>
        </a-entity>

        <!-- Lighting -->
        <a-light type="ambient" color="#1a1a2e" intensity="0.4"></a-light>
        <a-light type="point" color="#00ff88" intensity="0.3" position="0 5 -5" distance="20" decay="2"></a-light>
        <a-light type="point" color="#0088ff" intensity="0.2" position="-5 3 -3" distance="15" decay="2"></a-light>
        <a-light type="point" color="#ff0088" intensity="0.15" position="5 3 -3" distance="15" decay="2"></a-light>
        <a-light type="spot" color="#ffffff" intensity="0.5" position="0 8 0" angle="60" penumbra="0.8" target="#main-screen"></a-light>

        <!-- Main Xbox Screen (Center) -->
        <a-entity id="main-screen-group" position="0 2.5 -4">
            <!-- Screen glow backing -->
            <a-entity 
                geometry="primitive: cylinder; radius: 4.2; thetaLength: 70; height: 3"
                material="color: #00ff88; side: back; transparent: true; opacity: 0.05"
                rotation="0 25 0"
                position="0 0 -0.1">
            </a-entity>

            <!-- Main curved display -->
            <a-curvedimage
                id="main-screen"
                src="#game-canvas-asset"
                radius="4"
                theta-length="60"
                height="2.8"
                rotation="0 25 0"
                position="0 0 0"
                material="shader: flat; transparent: true">
            </a-curvedimage>

            <!-- Screen bezel/frame -->
            <a-entity 
                geometry="primitive: cylinder; radius: 4.05; thetaLength: 62; height: 2.9"
                material="color: #111; side: back; metalness: 0.8; roughness: 0.2"
                rotation="0 25 0"
                position="0 0 -0.05">
            </a-entity>

            <!-- 8K badge -->
            <a-plane
                color="#00ff88"
                width="0.3" height="0.15"
                position="1.2 1.6 -3.5"
                material="shader: flat; transparent: true; opacity: 0.9">
                <a-text value="8K" align="center" color="#000" width="2" position="0 0 0.01" font="roboto"></a-text>
            </a-plane>
        </a-entity>

        <!-- Browser Screen (Left) -->
        <a-entity id="browser-group" position="-3.5 2.5 -2.5" rotation="0 35 0">
            <a-plane
                id="browser-screen"
                src="#browser-canvas-asset"
                width="2" height="2.8"
                material="shader: flat; transparent: true">
            </a-plane>
            <a-plane
                color="#0a0a0a"
                width="2.1" height="2.9"
                position="0 0 -0.02"
                material="shader: flat; metalness: 0.9; roughness: 0.1">
            </a-plane>
            <!-- Browser title bar -->
            <a-plane
                color="#1a1a2e"
                width="2" height="0.15"
                position="0 1.45 0.01"
                material="shader: flat">
                <a-text value="ASTRO-NET BROWSER" align="center" color="#00ff88" width="3" position="0 0 0.01" font="roboto"></a-text>
            </a-plane>
        </a-entity>

        <!-- Social Chat (Right Top) -->
        <a-entity id="chat-group" position="3.5 3.2 -2.5" rotation="0 -35 0">
            <a-plane
                id="chat-screen"
                src="#chat-canvas-asset"
                width="1.6" height="2"
                material="shader: flat; transparent: true">
            </a-plane>
            <a-plane
                color="#0a0a0a"
                width="1.7" height="2.1"
                position="0 0 -0.02"
                material="shader: flat; metalness: 0.9; roughness: 0.1">
            </a-plane>
            <a-plane
                color="#1a1a2e"
                width="1.6" height="0.12"
                position="0 1.05 0.01"
                material="shader: flat">
                <a-text value="SOCIAL CHAT" align="center" color="#00ff88" width="2.5" position="0 0 0.01" font="roboto"></a-text>
            </a-plane>
        </a-entity>

        <!-- System Monitor (Right Bottom) -->
        <a-entity id="system-group" position="3.5 1.2 -2.5" rotation="0 -35 0">
            <a-plane
                id="system-screen"
                src="#system-canvas-asset"
                width="1.6" height="1.4"
                material="shader: flat; transparent: true">
            </a-plane>
            <a-plane
                color="#0a0a0a"
                width="1.7" height="1.5"
                position="0 0 -0.02"
                material="shader: flat; metalness: 0.9; roughness: 0.1">
            </a-plane>
            <a-plane
                color="#1a1a2e"
                width="1.6" height="0.12"
                position="0 0.75 0.01"
                material="shader: flat">
                <a-text value="SYSTEM" align="center" color="#00ff88" width="2.5" position="0 0 0.01" font="roboto"></a-text>
            </a-plane>
        </a-entity>

        <!-- Bottom Dock -->
        <a-entity id="dock" position="0 0.5 -3">
            <a-entity 
                geometry="primitive: box; width: 4; height: 0.08; depth: 0.3"
                material="color: #111; transparent: true; opacity: 0.9; metalness: 0.8"
                position="0 0 0">
            </a-entity>
            <a-entity 
                geometry="primitive: box; width: 4.1; height: 0.02; depth: 0.35"
                material="color: #00ff88; transparent: true; opacity: 0.3"
                position="0 -0.05 0">
            </a-entity>

            <!-- Dock icons -->
            <a-circle color="#00ff88" radius="0.12" position="-1.2 0.15 0.05" material="shader: flat; transparent: true; opacity: 0.8">
                <a-text value="X" align="center" color="#000" width="3" position="0 0 0.01"></a-text>
            </a-circle>
            <a-circle color="#0088ff" radius="0.12" position="-0.4 0.15 0.05" material="shader: flat; transparent: true; opacity: 0.8">
                <a-text value="B" align="center" color="#000" width="3" position="0 0 0.01"></a-text>
            </a-circle>
            <a-circle color="#ff0088" radius="0.12" position="0.4 0.15 0.05" material="shader: flat; transparent: true; opacity: 0.8">
                <a-text value="C" align="center" color="#000" width="3" position="0 0 0.01"></a-text>
            </a-circle>
            <a-circle color="#ffaa00" radius="0.12" position="1.2 0.15 0.05" material="shader: flat; transparent: true; opacity: 0.8">
                <a-text value="S" align="center" color="#000" width="3" position="0 0 0.01"></a-text>
            </a-circle>
        </a-entity>

        <!-- Player Rig -->
        <a-entity id="rig" position="0 1.6 1.5">
            <a-camera id="camera" look-controls="pointerLockEnabled: false" wasd-controls="acceleration: 50">
                <a-cursor 
                    color="#00ff88" 
                    scale="0.5 0.5 0.5"
                    animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 0.5 0.5 0.5"
                    animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 0.5 0.5 0.5; to: 0.1 0.1 0.1">
                </a-cursor>
            </a-camera>
        </a-entity>

        <!-- Laser controls for VR interaction -->
        <a-entity id="right-hand" laser-controls="hand: right" raycaster="objects: .clickable; far: 10"></a-entity>
        <a-entity id="left-hand" laser-controls="hand: left" raycaster="objects: .clickable; far: 10"></a-entity>

        <!-- Floating decorative elements -->
        <a-entity id="decorations"></a-entity>

    </a-scene>

    <script>
        // ==================== LOADING SEQUENCE ====================
        const loadingScreen = document.getElementById('loading-screen');
        const loaderStatus = document.getElementById('loader-status');
        const dots = [1,2,3,4].map(i => document.getElementById(`dot-${i}`));
        const statuses = [
            'Loading core modules...',
            'Initializing WebXR compositor...',
            'Connecting to Xbox Remote Play...',
            'Calibrating spatial anchors...',
            'Ready.'
        ];

        let statusIdx = 0;
        const statusInterval = setInterval(() => {
            if (statusIdx < statuses.length) {
                loaderStatus.textContent = statuses[statusIdx];
                if (dots[statusIdx]) dots[statusIdx].classList.add('active');
                statusIdx++;
            }
        }, 500);

        setTimeout(() => {
            clearInterval(statusInterval);
            loadingScreen.classList.add('hidden');
            setTimeout(() => loadingScreen.style.display = 'none', 1500);
        }, 2800);

        // ==================== CANVAS RENDERERS ====================

        // Game Canvas - Animated space scene
        const gameCanvas = document.getElementById('game-canvas');
        const gameCtx = gameCanvas.getContext('2d');
        let gameTime = 0;

        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * 1920,
                y: Math.random() * 1080,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 0.5 + 0.1,
                brightness: Math.random()
            });
        }

        const ships = [
            { x: 800, y: 500, vx: 2, vy: 0.5, color: '#4488ff', size: 40 },
            { x: 1100, y: 400, vx: -1.5, vy: -0.3, color: '#ff4444', size: 30 },
            { x: 600, y: 350, vx: 1, vy: 1, color: '#44ff88', size: 25 },
        ];

        const lasers = [];

        function drawGame() {
            gameTime += 0.016;

            // Deep space background
            const gradient = gameCtx.createRadialGradient(960, 540, 0, 960, 540, 800);
            gradient.addColorStop(0, '#0a0e2e');
            gradient.addColorStop(0.5, '#1a0a2e');
            gradient.addColorStop(1, '#0a0a15');
            gameCtx.fillStyle = gradient;
            gameCtx.fillRect(0, 0, 1920, 1080);

            // Nebula clouds
            gameCtx.globalAlpha = 0.15;
            for (let i = 0; i < 3; i++) {
                const nx = 960 + Math.sin(gameTime * 0.1 + i * 2) * 400;
                const ny = 540 + Math.cos(gameTime * 0.08 + i * 1.5) * 200;
                const ng = gameCtx.createRadialGradient(nx, ny, 0, nx, ny, 300);
                ng.addColorStop(0, ['#ff0088', '#0088ff', '#00ff88'][i]);
                ng.addColorStop(1, 'transparent');
                gameCtx.fillStyle = ng;
                gameCtx.fillRect(0, 0, 1920, 1080);
            }
            gameCtx.globalAlpha = 1;

            // Stars
            stars.forEach(star => {
                star.x -= star.speed;
                if (star.x < 0) star.x = 1920;
                const flicker = Math.sin(gameTime * 3 + star.x) * 0.3 + 0.7;
                gameCtx.fillStyle = `rgba(255, 255, 255, ${star.brightness * flicker})`;
                gameCtx.beginPath();
                gameCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                gameCtx.fill();
            });

            // Ships
            ships.forEach((ship, idx) => {
                ship.x += ship.vx;
                ship.y += ship.vy;
                if (ship.x > 1800 || ship.x < 120) ship.vx *= -1;
                if (ship.y > 900 || ship.y < 180) ship.vy *= -1;

                // Ship body
                gameCtx.save();
                gameCtx.translate(ship.x, ship.y);
                const angle = Math.atan2(ship.vy, ship.vx);
                gameCtx.rotate(angle);

                gameCtx.fillStyle = ship.color;
                gameCtx.beginPath();
                gameCtx.moveTo(ship.size, 0);
                gameCtx.lineTo(-ship.size * 0.6, -ship.size * 0.4);
                gameCtx.lineTo(-ship.size * 0.3, 0);
                gameCtx.lineTo(-ship.size * 0.6, ship.size * 0.4);
                gameCtx.closePath();
                gameCtx.fill();

                // Engine glow
                gameCtx.fillStyle = `rgba(0, 255, 255, ${0.5 + Math.sin(gameTime * 10) * 0.3})`;
                gameCtx.beginPath();
                gameCtx.arc(-ship.size * 0.5, 0, ship.size * 0.2, 0, Math.PI * 2);
                gameCtx.fill();

                gameCtx.restore();

                // Random laser fire
                if (Math.random() < 0.02) {
                    const target = ships[(idx + 1) % ships.length];
                    lasers.push({
                        x: ship.x, y: ship.y,
                        tx: target.x, ty: target.y,
                        life: 1,
                        color: ship.color
                    });
                }
            });

            // Lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                const l = lasers[i];
                l.life -= 0.05;
                if (l.life <= 0) { lasers.splice(i, 1); continue; }

                gameCtx.strokeStyle = l.color;
                gameCtx.lineWidth = 3;
                gameCtx.globalAlpha = l.life;
                gameCtx.beginPath();
                gameCtx.moveTo(l.x, l.y);
                gameCtx.lineTo(l.x + (l.tx - l.x) * (1 - l.life), l.y + (l.ty - l.y) * (1 - l.life));
                gameCtx.stroke();
                gameCtx.globalAlpha = 1;
            }

            // HUD overlay on game screen
            gameCtx.fillStyle = 'rgba(0, 255, 136, 0.8)';
            gameCtx.font = 'bold 16px "Roboto Mono", monospace';
            gameCtx.fillText('REMOTE PLAY ACTIVE', 40, 50);
            gameCtx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            gameCtx.font = '12px "Roboto Mono", monospace';
            gameCtx.fillText('STARFIELD CONFLICT // SECTOR 7G', 40, 70);

            // Crosshair
            gameCtx.strokeStyle = 'rgba(0, 255, 136, 0.4)';
            gameCtx.lineWidth = 1;
            const cx = 960, cy = 540;
            gameCtx.beginPath();
            gameCtx.moveTo(cx - 20, cy); gameCtx.lineTo(cx + 20, cy);
            gameCtx.moveTo(cx, cy - 20); gameCtx.lineTo(cx, cy + 20);
            gameCtx.stroke();

            requestAnimationFrame(drawGame);
        }
        drawGame();

        // Browser Canvas
        const browserCanvas = document.getElementById('browser-canvas');
        const browserCtx = browserCanvas.getContext('2d');
        let browserScroll = 0;

        function drawBrowser() {
            browserScroll = (browserScroll + 0.5) % 200;

            browserCtx.fillStyle = '#0a0e1a';
            browserCtx.fillRect(0, 0, 800, 1200);

            // URL bar
            browserCtx.fillStyle = '#1a1f2e';
            browserCtx.fillRect(20, 20, 760, 40);
            browserCtx.fillStyle = '#00ff88';
            browserCtx.font = '14px "Roboto Mono", monospace';
            browserCtx.fillText('https://xbox.com/play', 40, 45);

            // Content cards
            const cards = [
                { title: 'Halo Infinite', sub: 'Campaign // Co-op', color: '#4488ff', y: 100 },
                { title: 'Forza Horizon 5', sub: 'Racing // Open World', color: '#ff8800', y: 320 },
                { title: 'Starfield', sub: 'RPG // Space', color: '#00ff88', y: 540 },
                { title: 'Gears 5', sub: 'Shooter // Action', color: '#ff4444', y: 760 },
            ];

            cards.forEach(card => {
                const y = card.y - browserScroll;
                if (y < -200 || y > 1200) return;

                browserCtx.fillStyle = '#151a2e';
                browserCtx.fillRect(30, y, 740, 180);
                browserCtx.strokeStyle = card.color;
                browserCtx.lineWidth = 2;
                browserCtx.strokeRect(30, y, 740, 180);

                browserCtx.fillStyle = card.color;
                browserCtx.font = 'bold 24px "Orbitron", sans-serif';
                browserCtx.fillText(card.title, 60, y + 50);
                browserCtx.fillStyle = '#888';
                browserCtx.font = '14px "Roboto Mono", monospace';
                browserCtx.fillText(card.sub, 60, y + 80);

                // Play button
                browserCtx.fillStyle = card.color;
                browserCtx.beginPath();
                browserCtx.roundRect(60, y + 110, 100, 35, 6);
                browserCtx.fill();
                browserCtx.fillStyle = '#000';
                browserCtx.font = 'bold 14px "Roboto Mono", monospace';
                browserCtx.fillText('PLAY', 90, y + 133);
            });

            requestAnimationFrame(drawBrowser);
        }
        drawBrowser();

        // Chat Canvas
        const chatCanvas = document.getElementById('chat-canvas');
        const chatCtx = chatCanvas.getContext('2d');
        const chatMessages = [
            { user: 'CYBER-SQUAD', msg: 'Raid at 21:00', time: '1:50 PM', color: '#00ff88' },
            { user: 'ASTRO-NET', msg: 'New mission available', time: '2:00 PM', color: '#0088ff' },
            { user: 'CYBER-SQUAD', msg: 'Loading sector 7...', time: '2:05 PM', color: '#00ff88' },
            { user: 'NOVA-7', msg: 'Enemy contact!', time: '2:10 PM', color: '#ff4444' },
            { user: 'CYBER-SQUAD', msg: 'Formation delta', time: '2:12 PM', color: '#00ff88' },
            { user: 'ASTRO-NET', msg: 'Reinforcements inbound', time: '2:15 PM', color: '#0088ff' },
        ];
        let chatOffset = 0;

        function drawChat() {
            chatOffset = (chatOffset + 0.3) % 100;

            chatCtx.fillStyle = '#0a0e1a';
            chatCtx.fillRect(0, 0, 600, 800);

            chatMessages.forEach((msg, i) => {
                const y = 60 + i * 100 - chatOffset;
                if (y < -50 || y > 800) return;

                // Avatar circle
                chatCtx.fillStyle = msg.color;
                chatCtx.beginPath();
                chatCtx.arc(40, y + 20, 18, 0, Math.PI * 2);
                chatCtx.fill();
                chatCtx.fillStyle = '#000';
                chatCtx.font = 'bold 12px "Orbitron", sans-serif';
                chatCtx.fillText(msg.user[0], 35, y + 25);

                // Username
                chatCtx.fillStyle = msg.color;
                chatCtx.font = 'bold 13px "Roboto Mono", monospace';
                chatCtx.fillText(msg.user, 75, y + 12);

                // Time
                chatCtx.fillStyle = '#555';
                chatCtx.font = '11px "Roboto Mono", monospace';
                chatCtx.fillText(msg.time, 480, y + 12);

                // Message
                chatCtx.fillStyle = '#aaa';
                chatCtx.font = '13px "Roboto Mono", monospace';
                chatCtx.fillText(msg.msg, 75, y + 35);

                // Divider
                chatCtx.strokeStyle = '#1a1f2e';
                chatCtx.lineWidth = 1;
                chatCtx.beginPath();
                chatCtx.moveTo(30, y + 60);
                chatCtx.lineTo(570, y + 60);
                chatCtx.stroke();
            });

            // Input box
            chatCtx.fillStyle = '#1a1f2e';
            chatCtx.fillRect(20, 740, 500, 40);
            chatCtx.strokeStyle = '#00ff88';
            chatCtx.lineWidth = 1;
            chatCtx.strokeRect(20, 740, 500, 40);
            chatCtx.fillStyle = '#555';
            chatCtx.font = '13px "Roboto Mono", monospace';
            chatCtx.fillText('Type a message...', 40, 765);

            // Send button
            chatCtx.fillStyle = '#00ff88';
            chatCtx.beginPath();
            chatCtx.arc(555, 760, 18, 0, Math.PI * 2);
            chatCtx.fill();
            chatCtx.fillStyle = '#000';
            chatCtx.font = 'bold 14px "Roboto Mono", monospace';
            chatCtx.fillText('>', 550, 765);

            requestAnimationFrame(drawChat);
        }
        drawChat();

        // System Canvas
        const systemCanvas = document.getElementById('system-canvas');
        const systemCtx = systemCanvas.getContext('2d');
        const sysHistory = [];
        for (let i = 0; i < 60; i++) sysHistory.push(30 + Math.random() * 20);

        function drawSystem() {
            systemCtx.fillStyle = '#0a0e1a';
            systemCtx.fillRect(0, 0, 600, 600);

            // GPU Temp gauge
            const gpuTemp = 55 + Math.sin(Date.now() / 2000) * 5;
            systemCtx.strokeStyle = '#1a1f2e';
            systemCtx.lineWidth = 8;
            systemCtx.beginPath();
            systemCtx.arc(150, 150, 80, Math.PI * 0.8, Math.PI * 2.2);
            systemCtx.stroke();

            const gpuAngle = Math.PI * 0.8 + (gpuTemp / 100) * (Math.PI * 1.4);
            systemCtx.strokeStyle = gpuTemp > 70 ? '#ff4444' : gpuTemp > 60 ? '#ffaa00' : '#00ff88';
            systemCtx.lineWidth = 8;
            systemCtx.beginPath();
            systemCtx.arc(150, 150, 80, Math.PI * 0.8, gpuAngle);
            systemCtx.stroke();

            systemCtx.fillStyle = '#fff';
            systemCtx.font = 'bold 28px "Orbitron", sans-serif';
            systemCtx.textAlign = 'center';
            systemCtx.fillText(`${gpuTemp.toFixed(0)}°C`, 150, 155);
            systemCtx.fillStyle = '#888';
            systemCtx.font = '12px "Roboto Mono", monospace';
            systemCtx.fillText('GPU TEMP', 150, 180);

            // CPU Load gauge
            const cpuLoad = 12 + Math.sin(Date.now() / 1500) * 8;
            systemCtx.strokeStyle = '#1a1f2e';
            systemCtx.lineWidth = 8;
            systemCtx.beginPath();
            systemCtx.arc(420, 150, 80, Math.PI * 0.8, Math.PI * 2.2);
            systemCtx.stroke();

            const cpuAngle = Math.PI * 0.8 + (cpuLoad / 100) * (Math.PI * 1.4);
            systemCtx.strokeStyle = '#00ff88';
            systemCtx.lineWidth = 8;
            systemCtx.beginPath();
            systemCtx.arc(420, 150, 80, Math.PI * 0.8, cpuAngle);
            systemCtx.stroke();

            systemCtx.fillStyle = '#fff';
            systemCtx.font = 'bold 28px "Orbitron", sans-serif';
            systemCtx.fillText(`${cpuLoad.toFixed(0)}%`, 420, 155);
            systemCtx.fillStyle = '#888';
            systemCtx.font = '12px "Roboto Mono", monospace';
            systemCtx.fillText('CPU LOAD', 420, 180);

            // History graph
            sysHistory.shift();
            sysHistory.push(30 + Math.random() * 20 + Math.sin(Date.now() / 1000) * 10);

            systemCtx.strokeStyle = '#00ff88';
            systemCtx.lineWidth = 2;
            systemCtx.beginPath();
            sysHistory.forEach((val, i) => {
                const x = 50 + i * 8.5;
                const y = 450 - val * 3;
                if (i === 0) systemCtx.moveTo(x, y);
                else systemCtx.lineTo(x, y);
            });
            systemCtx.stroke();

            systemCtx.fillStyle = 'rgba(0, 255, 136, 0.1)';
            systemCtx.beginPath();
            systemCtx.moveTo(50, 450);
            sysHistory.forEach((val, i) => {
                systemCtx.lineTo(50 + i * 8.5, 450 - val * 3);
            });
            systemCtx.lineTo(560, 450);
            systemCtx.closePath();
            systemCtx.fill();

            // Labels
            systemCtx.fillStyle = '#555';
            systemCtx.font = '11px "Roboto Mono", monospace';
            systemCtx.textAlign = 'left';
            systemCtx.fillText('0s', 50, 470);
            systemCtx.fillText('30s', 280, 470);
            systemCtx.fillText('60s', 530, 470);

            requestAnimationFrame(drawSystem);
        }
        drawSystem();

        // ==================== LATENCY GRAPH ====================
        const latCanvas = document.getElementById('latency-canvas');
        const latCtx = latCanvas.getContext('2d');
        const latHistory = [];
        for (let i = 0; i < 40; i++) latHistory.push(20 + Math.random() * 10);

        function drawLatency() {
            latHistory.shift();
            latHistory.push(20 + Math.random() * 8 + Math.sin(Date.now() / 800) * 5);

            latCtx.clearRect(0, 0, 160, 30);
            latCtx.strokeStyle = '#00ff88';
            latCtx.lineWidth = 1.5;
            latCtx.beginPath();
            latHistory.forEach((val, i) => {
                const x = i * 4;
                const y = 30 - (val / 40) * 30;
                if (i === 0) latCtx.moveTo(x, y);
                else latCtx.lineTo(x, y);
            });
            latCtx.stroke();

            // Update text
            const current = latHistory[latHistory.length - 1];
            document.getElementById('latency-val').textContent = `${current.toFixed(0)}ms`;
            document.getElementById('latency-val').className = current < 30 ? 'stat-value good' : current < 50 ? 'stat-value warn' : 'stat-value bad';
        }
        setInterval(drawLatency, 200);

        // ==================== HUD UPDATES ====================
        setInterval(() => {
            document.getElementById('fps-val').textContent = Math.round(58 + Math.random() * 4);
            document.getElementById('gpu-temp').textContent = `${(55 + Math.sin(Date.now() / 2000) * 5).toFixed(0)}°C`;
            document.getElementById('cpu-load').textContent = `${(12 + Math.sin(Date.now() / 1500) * 8).toFixed(0)}%`;
            document.getElementById('bitrate-val').textContent = `${(40 + Math.random() * 10).toFixed(0)} Mbps`;
            document.getElementById('battery-val').textContent = `${(65 + Math.sin(Date.now() / 10000) * 3).toFixed(0)}%`;
        }, 1000);

        // ==================== ZOOM / FOCUS CONTROLS ====================
        let currentZoom = 1.0;
        const zoomStep = 0.05;
        const zoomIndicator = document.getElementById('zoom-indicator');
        const zoomBarFill = document.getElementById('zoom-bar-fill');
        let zoomTimeout;

        function updateZoom(direction) {
            if (direction === 'up') currentZoom += zoomStep;
            else currentZoom -= zoomStep;
            currentZoom = Math.max(0.5, Math.min(currentZoom, 2.0));

            // Update A-Frame camera FOV to simulate zoom
            const camera = document.getElementById('camera');
            const newFov = 80 / currentZoom;
            camera.setAttribute('fov', newFov);

            // Update UI
            const pct = ((currentZoom - 0.5) / 1.5) * 100;
            zoomBarFill.style.width = `${pct}%`;
            zoomIndicator.classList.add('visible');

            clearTimeout(zoomTimeout);
            zoomTimeout = setTimeout(() => zoomIndicator.classList.remove('visible'), 2000);
        }

        // ==================== KEYBOARD CONTROLS ====================
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    updateZoom('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    updateZoom('down');
                    break;
                case '1':
                    togglePanel('browser-group');
                    break;
                case '2':
                    togglePanel('chat-group');
                    break;
                case '3':
                    togglePanel('system-group');
                    break;
                case '4':
                    toggleMR();
                    break;
            }
        });

        function togglePanel(id) {
            const panel = document.getElementById(id);
            const current = panel.getAttribute('visible');
            panel.setAttribute('visible', current === 'false' ? 'true' : 'false');
        }

        let mrMode = false;
        function toggleMR() {
            mrMode = !mrMode;
            const scene = document.querySelector('a-scene');
            if (mrMode) {
                scene.setAttribute('background', 'color', '#000000');
                document.getElementById('room').setAttribute('visible', 'false');
            } else {
                scene.setAttribute('background', 'color', '#050508');
                document.getElementById('room').setAttribute('visible', 'true');
            }
            document.getElementById('btn-mr').classList.toggle('active');
        }

        // ==================== BUTTON HANDLERS ====================
        document.getElementById('btn-browser').addEventListener('click', () => togglePanel('browser-group'));
        document.getElementById('btn-chat').addEventListener('click', () => togglePanel('chat-group'));
        document.getElementById('btn-system').addEventListener('click', () => togglePanel('system-group'));
        document.getElementById('btn-mr').addEventListener('click', toggleMR);
        document.getElementById('btn-home').addEventListener('click', () => {
            document.getElementById('rig').setAttribute('position', '0 1.6 1.5');
            document.getElementById('rig').setAttribute('rotation', '0 0 0');
        });

        // ==================== VR BUTTON ====================
        document.getElementById('enter-vr').addEventListener('click', () => {
            const scene = document.querySelector('a-scene');
            if (scene.enterVR) {
                scene.enterVR();
            }
        });

        // ==================== STARFIELD DECORATIONS ====================
        const decorations = document.getElementById('decorations');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('a-sphere');
            star.setAttribute('radius', Math.random() * 0.03 + 0.01);
            star.setAttribute('color', Math.random() > 0.7 ? '#00ff88' : '#ffffff');
            star.setAttribute('position', {
                x: (Math.random() - 0.5) * 20,
                y: Math.random() * 10,
                z: (Math.random() - 0.5) * 20 - 5
            });
            star.setAttribute('animation', {
                property: 'position',
                to: `${(Math.random() - 0.5) * 20} ${Math.random() * 10} ${(Math.random() - 0.5) * 20 - 5}`,
                dur: 10000 + Math.random() * 20000,
                easing: 'linear',
                loop: true,
                dir: 'alternate'
            });
            decorations.appendChild(star);
        }

        // ==================== A-FRAME ASSET SYNC ====================
        // Sync canvases to A-Frame assets
        setInterval(() => {
            const gameAsset = document.getElementById('game-canvas-asset');
            if (gameAsset) {
                const ctx = gameAsset.getContext('2d');
                ctx.drawImage(gameCanvas, 0, 0);
            }
            const browserAsset = document.getElementById('browser-canvas-asset');
            if (browserAsset) {
                const ctx = browserAsset.getContext('2d');
                ctx.drawImage(browserCanvas, 0, 0);
            }
            const chatAsset = document.getElementById('chat-canvas-asset');
            if (chatAsset) {
                const ctx = chatAsset.getContext('2d');
                ctx.drawImage(chatCanvas, 0, 0);
            }
            const systemAsset = document.getElementById('system-canvas-asset');
            if (systemAsset) {
                const ctx = systemAsset.getContext('2d');
                ctx.drawImage(systemCanvas, 0, 0);
            }
        }, 50);

        // ==================== CURSOR INTERACTIONS ====================
        const screens = ['main-screen', 'browser-screen', 'chat-screen', 'system-screen'];
        screens.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.classList.add('clickable');
                el.addEventListener('click', () => {
                    el.setAttribute('animation', {
                        property: 'scale',
                        to: '1.05 1.05 1.05',
                        dur: 150,
                        easing: 'easeInOutQuad'
                    });
                    setTimeout(() => {
                        el.setAttribute('animation', {
                            property: 'scale',
                            to: '1 1 1',
                            dur: 150,
                            easing: 'easeInOutQuad'
                        });
                    }, 150);
                });
            }
        });

        console.log('%c XBOX VR DASHBOARD ', 'background: #00ff88; color: #000; font-size: 20px; font-weight: bold; padding: 10px 20px;');
        console.log('%c Spatial Dashboard v1.0 | WebXR Ready ', 'color: #00ff88; font-size: 12px;');
    </script>
</body>
</html>
